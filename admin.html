<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 - 智慧感測研究室</title>
<style>
  :root {
    --navy: #16365c;
    --navy-dark: #0a1f38;
    --coffee: #8a5a3c;
    --coffee-light: #b07d52;
    --gray-bg: #f6f5f2;
    --text-main: #1c1c1c;
    --text-light: #6b7280;
    --white: #ffffff;
    --radius: 10px;
    --shadow: 0 4px 16px rgba(15, 42, 74, 0.08);
    --danger: #b3261e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-main);
    background: var(--gray-bg);
    line-height: 1.6;
  }

  a { text-decoration: none; color: inherit; }

  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    padding: 24px;
  }

  .login-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    border-top: 4px solid var(--coffee);
  }

  .login-card h1 {
    color: var(--navy);
    font-size: 1.3rem;
    margin-bottom: 6px;
    text-align: center;
  }

  .login-card .sub {
    color: var(--text-light);
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 24px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d6dce5;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
  }

  .field textarea { resize: vertical; min-height: 70px; }

  .btn {
    display: inline-block;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-primary { background: var(--navy); color: var(--white); width: 100%; }
  .btn-primary:hover { background: var(--navy-dark); }

  .btn-coffee { background: var(--coffee); color: var(--white); }
  .btn-coffee:hover { background: var(--coffee-light); }

  .btn-outline { background: var(--white); color: var(--navy); border: 1px solid var(--navy); }
  .btn-danger { background: var(--white); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: var(--white); }

  .error-msg {
    background: #fdecea;
    color: var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }

  #dashboard { display: none; }

  .topbar {
    background: var(--navy);
    color: var(--white);
    border-bottom: 3px solid var(--coffee);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar .who { font-size: 0.9rem; }
  .topbar .who span { color: var(--coffee-light); font-weight: 700; }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid #d6dce5;
    background: var(--white);
    color: var(--navy);
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
  }

  .tab-btn.active {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .panel-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
  }

  .panel-card h2 {
    color: var(--navy);
    font-size: 1.05rem;
    margin-bottom: 16px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
  }

  .form-grid .full { grid-column: 1 / -1; }

  .form-actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
  }

  .row-item {
    border: 1px solid #e7ebf1;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .row-item .info h3 {
    color: var(--navy);
    font-size: 1rem;
    margin-bottom: 4px;
  }

  .row-item .info .meta {
    color: var(--coffee);
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .row-item .info p {
    color: var(--text-light);
    font-size: 0.88rem;
  }

  .row-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .row-actions .btn { padding: 6px 12px; font-size: 0.82rem; }

  .empty-hint {
    color: var(--text-light);
    font-size: 0.88rem;
    padding: 12px 0;
  }

  .edit-form {
    border: 1px dashed var(--coffee-light);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    background: #fffaf5;
  }
</style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <h1>智慧感測研究室 後台管理</h1>
      <div class="sub">請使用管理者帳號登入</div>
      <div class="error-msg" id="loginError"></div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required autocomplete="username">
        </div>
        <div class="field">
          <label>密碼</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">登入</button>
      </form>
    </div>
  </div>

  <div id="dashboard">
    <div class="topbar">
      <div class="who">已登入：<span id="whoEmail"></span> | <a href="index.html" style="color: rgba(255,255,255,0.7); font-size: 0.85rem;">回前台</a></div>
      <button class="btn btn-outline" id="logoutBtn" style="background:transparent;color:#fff;border-color:rgba(255,255,255,0.5);">登出</button>
    </div>

    <div class="wrap">
      <div class="tabs">
        <button class="tab-btn active" data-tab="members">研究成員</button>
        <button class="tab-btn" data-tab="topics">研究主題</button>
        <button class="tab-btn" data-tab="news">最新消息</button>
      </div>

      <div class="panel active" id="panel-members">
        <div class="panel-card">
          <h2>＋ 新增成員</h2>
          <form id="form-members" class="form-grid">
            <div class="field"><label>姓名</label><input name="name" required placeholder="例：王志明 教授"></div>
            <div class="field"><label>職稱</label><input name="title" required placeholder="例：博士生"></div>
            <div class="field"><label>顯示順序</label><input name="sort_order" type="number" value="0"></div>
            <div class="field full"><label>研究方向</label><input name="field" required placeholder="例：智慧感測系統、訊號處理"></div>
            <div class="form-actions full">
              <button type="submit" class="btn btn-coffee">新增成員</button>
            </div>
          </form>
        </div>
        <div class="panel-card">
          <h2>現有成員</h2>
          <div id="list-members"></div>
        </div>
      </div>

      <div class="panel" id="panel-topics">
        <div class="panel-card">
          <h2>＋ 新增研究主題</h2>
          <form id="form-topics" class="form-grid">
            <div class="field"><label>圖示</label>
              <select name="icon">
                <option value="pulse">pulse - 心跳</option>
                <option value="globe">globe - 地球</option>
                <option value="chip">chip - 晶片</option>
              </select>
            </div>
            <div class="field"><label>顯示順序</label><input name="sort_order" type="number" value="0"></div>
            <div class="field full"><label>主題名稱</label><input name="title" required placeholder="例：穿戴式智慧醫療感測"></div>
            <div class="field full"><label>說明文字</label><textarea name="description" required></textarea></div>
            <div class="form-actions full">
              <button type="submit" class="btn btn-coffee">新增主題</button>
            </div>
          </form>
        </div>
        <div class="panel-card">
          <h2>現有研究主題</h2>
          <div id="list-topics"></div>
        </div>
      </div>

      <div class="panel" id="panel-news">
        <div class="panel-card">
          <h2>＋ 新增最新消息</h2>
          <form id="form-news" class="form-grid">
            <div class="field"><label>發布日期</label><input name="published_date" type="date" required></div>
            <div class="field full"><label>標題</label><input name="title" required></div>
            <div class="field full"><label>說明文字</label><textarea name="description" required></textarea></div>
            <div class="form-actions full">
              <button type="submit" class="btn btn-coffee">新增消息</button>
            </div>
          </form>
        </div>
        <div class="panel-card">
          <h2>現有消息</h2>
          <div id="list-news"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://zftyiqfqwuhxvibhxosi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Ux9Ya2ULT6XjAuKP85aJnw_nthS-rJ3';
    const ADMIN_EMAIL = 'taigiendio@gmail.com';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const loginError = document.getElementById('loginError');

    function showLogin(message) {
      dashboard.style.display = 'none';
      loginScreen.style.display = 'flex';
      if (message) {
        loginError.textContent = message;
        loginError.style.display = 'block';
      } else {
        loginError.style.display = 'none';
      }
    }

    function showDashboard(email) {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      document.getElementById('whoEmail').textContent = email;
      loadAll();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        showLogin('登入失敗：帳號或密碼錯誤');
        return;
      }
      if (data.user.email !== ADMIN_EMAIL) {
        await supabaseClient.auth.signOut();
        showLogin('此帳號無管理權限');
        return;
      }
      showDashboard(data.user.email);
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });

    supabaseClient.auth.getSession().then(({ data }) => {
      const user = data.session && data.session.user;
      if (user && user.email === ADMIN_EMAIL) {
        showDashboard(user.email);
      } else {
        showLogin();
      }
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });

    async function loadAll() {
      await Promise.all([loadMembers(), loadTopics(), loadNews()]);
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str == null ? '' : String(str);
      return d.innerHTML;
    }

    async function loadMembers() {
      const { data, error } = await supabaseClient.from('members').select('*').order('sort_order', { ascending: true });
      const list = document.getElementById('list-members');
      if (error) { list.innerHTML = '<div class="empty-hint">讀取失敗</div>'; return; }
      if (!data.length) { list.innerHTML = '<div class="empty-hint">目前沒有資料</div>'; return; }
      list.innerHTML = data.map(m => `
        <div class="row-item" data-id="${m.id}">
          <div class="info">
            <h3>${escapeHtml(m.name)}</h3>
            <div class="meta">${escapeHtml(m.title)} (順序: ${m.sort_order})</div>
            <p>${escapeHtml(m.field)}</p>
          </div>
          <div class="row-actions">
            <button class="btn btn-outline" onclick="editMember(${m.id})">編輯</button>
            <button class="btn btn-danger" onclick="deleteRow('members', ${m.id}, loadMembers)">刪除</button>
          </div>
        </div>
      `).join('');
      window.__membersCache = data;
    }

    window.editMember = function (id) {
      const m = window.__membersCache.find(x => x.id === id);
      const row = document.querySelector(`#list-members .row-item[data-id="${id}"]`);
      row.outerHTML = `
        <form class="edit-form" onsubmit="return saveMember(event, ${id})">
          <div class="form-grid">
            <div class="field"><label>姓名</label><input name="name" required value="${escapeHtml(m.name)}"></div>
            <div class="field"><label>職稱</label><input name="title" required value="${escapeHtml(m.title)}"></div>
            <div class="field"><label>顯示順序</label><input name="sort_order" type="number" value="${m.sort_order}"></div>
            <div class="field full"><label>研究方向</label><input name="field" required value="${escapeHtml(m.field)}"></div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-coffee">儲存</button>
            <button type="button" class="btn btn-outline" onclick="loadMembers()">取消</button>
          </div>
        </form>
      `;
    };

    window.saveMember = async function (e, id) {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('members').update({
        name: f.name.value.trim(),
        title: f.title.value.trim(),
        field: f.field.value.trim(),
        sort_order: Number(f.sort_order.value) || 0
      }).eq('id', id);
      if (error) { alert('儲存失敗'); return false; }
      loadMembers();
      return false;
    };

    document.getElementById('form-members').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('members').insert({
        name: f.name.value.trim(),
        title: f.title.value.trim(),
        field: f.field.value.trim(),
        sort_order: Number(f.sort_order.value) || 0
      });
      if (error) { alert('新增失敗'); return; }
      f.reset();
      loadMembers();
    });

    async function loadTopics() {
      const { data, error } = await supabaseClient.from('topics').select('*').order('sort_order', { ascending: true });
      const list = document.getElementById('list-topics');
      if (error) { list.innerHTML = '<div class="empty-hint">讀取失敗</div>'; return; }
      if (!data.length) { list.innerHTML = '<div class="empty-hint">目前沒有資料</div>'; return; }
      list.innerHTML = data.map(t => `
        <div class="row-item" data-id="${t.id}">
          <div class="info">
            <h3>${escapeHtml(t.title)}</h3>
            <div class="meta">${escapeHtml(t.icon)} (順序: ${t.sort_order})</div>
            <p>${escapeHtml(t.description)}</p>
          </div>
          <div class="row-actions">
            <button class="btn btn-outline" onclick="editTopic(${t.id})">編輯</button>
            <button class="btn btn-danger" onclick="deleteRow('topics', ${t.id}, loadTopics)">刪除</button>
          </div>
        </div>
      `).join('');
      window.__topicsCache = data;
    }

    window.editTopic = function (id) {
      const t = window.__topicsCache.find(x => x.id === id);
      const row = document.querySelector(`#list-topics .row-item[data-id="${id}"]`);
      row.outerHTML = `
        <form class="edit-form" onsubmit="return saveTopic(event, ${id})">
          <div class="form-grid">
            <div class="field"><label>主題名稱</label><input name="title" required value="${escapeHtml(t.title)}"></div>
            <div class="field"><label>顯示順序</label><input name="sort_order" type="number" value="${t.sort_order}"></div>
            <div class="field full"><label>說明文字</label><textarea name="description" required>${escapeHtml(t.description)}</textarea></div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-coffee">儲存</button>
            <button type="button" class="btn btn-outline" onclick="loadTopics()">取消</button>
          </div>
        </form>
      `;
    };

    window.saveTopic = async function (e, id) {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('topics').update({
        title: f.title.value.trim(),
        description: f.description.value.trim(),
        sort_order: Number(f.sort_order.value) || 0
      }).eq('id', id);
      if (error) { alert('儲存失敗'); return false; }
      loadTopics();
      return false;
    };

    document.getElementById('form-topics').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('topics').insert({
        icon: f.icon?.value || 'pulse',
        title: f.title.value.trim(),
        description: f.description.value.trim(),
        sort_order: Number(f.sort_order.value) || 0
      });
      if (error) { alert('新增失敗'); return; }
      f.reset();
      loadTopics();
    });

    async function loadNews() {
      const { data, error } = await supabaseClient.from('news').select('*').order('published_date', { ascending: false });
      const list = document.getElementById('list-news');
      if (error) { list.innerHTML = '<div class="empty-hint">讀取失敗</div>'; return; }
      if (!data.length) { list.innerHTML = '<div class="empty-hint">目前沒有資料</div>'; return; }
      list.innerHTML = data.map(n => `
        <div class="row-item" data-id="${n.id}">
          <div class="info">
            <h3>${escapeHtml(n.title)}</h3>
            <div class="meta">${escapeHtml(n.published_date)}</div>
            <p>${escapeHtml(n.description)}</p>
          </div>
          <div class="row-actions">
            <button class="btn btn-outline" onclick="editNews(${n.id})">編輯</button>
            <button class="btn btn-danger" onclick="deleteRow('news', ${n.id}, loadNews)">刪除</button>
          </div>
        </div>
      `).join('');
      window.__newsCache = data;
    }

    window.editNews = function (id) {
      const n = window.__newsCache.find(x => x.id === id);
      const row = document.querySelector(`#list-news .row-item[data-id="${id}"]`);
      row.outerHTML = `
        <form class="edit-form" onsubmit="return saveNews(event, ${id})">
          <div class="form-grid">
            <div class="field"><label>發布日期</label><input name="published_date" type="date" required value="${n.published_date}"></div>
            <div class="field full"><label>標題</label><input name="title" required value="${escapeHtml(n.title)}"></div>
            <div class="field full"><label>說明文字</label><textarea name="description" required>${escapeHtml(n.description)}</textarea></div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-coffee">儲存</button>
            <button type="button" class="btn btn-outline" onclick="loadNews()">取消</button>
          </div>
        </form>
      `;
    };

    window.saveNews = async function (e, id) {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('news').update({
        published_date: f.published_date.value,
        title: f.title.value.trim(),
        description: f.description.value.trim()
      }).eq('id', id);
      if (error) { alert('儲存失敗'); return false; }
      loadNews();
      return false;
    };

    document.getElementById('form-news').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const { error } = await supabaseClient.from('news').insert({
        published_date: f.published_date.value,
        title: f.title.value.trim(),
        description: f.description.value.trim()
      });
      if (error) { alert('新增失敗'); return; }
      f.reset();
      loadNews();
    });

    window.deleteRow = async function (table, id, reload) {
      if (!confirm('確定要刪除？')) return;
      const { error } = await supabaseClient.from(table).delete().eq('id', id);
      if (error) { alert('刪除失敗'); return; }
      reload();
    };
  </script>
</body>
</html>
