<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧感測研究室</title>
<style>
  :root {
    --navy: #16365c;
    --navy-dark: #0a1f38;
    --coffee: #8a5a3c;
    --coffee-light: #b07d52;
    --gray-bg: #f6f5f2;
    --text-main: #1c1c1c;
    --text-light: #6b7280;
    --white: #ffffff;
    --radius: 10px;
    --shadow: 0 4px 16px rgba(15, 42, 74, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-main);
    background: var(--white);
    line-height: 1.7;
  }

  a { text-decoration: none; color: inherit; }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: var(--white);
    padding: 20px 0;
    border-bottom: 3px solid var(--coffee);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { font-size: 1.4rem; font-weight: 700; }

  nav a { margin: 0 16px; font-size: 0.9rem; }
  nav a:hover { color: var(--coffee-light); }

  .admin-btn {
    background: var(--coffee);
    color: var(--white);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s;
  }

  .admin-btn:hover {
    background: var(--coffee-light);
  }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  section { padding: 60px 0; }
  section h2 { color: var(--navy); font-size: 1.8rem; margin-bottom: 30px; text-align: center; }

  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: var(--white);
    text-align: center;
    padding: 100px 20px;
  }

  .hero h1 { font-size: 2.5rem; margin-bottom: 20px; }
  .hero p { font-size: 1.1rem; color: rgba(255,255,255,0.9); }

  .card { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .card h3 { color: var(--navy); margin-bottom: 12px; }
  .card p { color: var(--text-light); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-top: 30px;
  }

  footer {
    background: var(--navy);
    color: var(--white);
    text-align: center;
    padding: 30px 0;
    margin-top: 60px;
  }

  .members, .topics, .news { background: var(--gray-bg); }

  .member-item, .topic-item, .news-item {
    background: var(--white);
    padding: 20px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .member-item h3, .topic-item h3, .news-item h3 { color: var(--navy); }
  .member-item .meta { color: var(--coffee); font-size: 0.9rem; font-weight: 600; margin: 8px 0; }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="logo">🔬 智慧感測研究室</div>
    <nav>
      <a href="#members">研究成員</a>
      <a href="#topics">研究主題</a>
      <a href="#news">最新消息</a>
      <a href="dashboard.html" class="admin-btn">🔐 管理員進入</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>智慧感測研究室</h1>
  <p>致力於穿戴式感測、環境監測及資料智慧分析</p>
</section>

<section class="members" id="members">
  <div class="wrap">
    <h2>研究成員</h2>
    <div id="membersList"></div>
  </div>
</section>

<section class="topics" id="topics">
  <div class="wrap">
    <h2>研究主題</h2>
    <div id="topicsList" class="grid"></div>
  </div>
</section>

<section class="news" id="news">
  <div class="wrap">
    <h2>最新消息</h2>
    <div id="newsList"></div>
  </div>
</section>

<footer>
  <p>&copy; 2026 智慧感測研究室. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = window.location.hostname === 'localhost' 
    ? 'https://zftyiqfqwuhxvibhxosi.supabase.co'
    : (window.SUPABASE_CONFIG?.URL || 'https://zftyiqfqwuhxvibhxosi.supabase.co');
  
  const SUPABASE_KEY = window.location.hostname === 'localhost'
    ? 'sb_publishable_Ux9Ya2ULT6XjAuKP85aJnw_nthS-rJ3'
    : (window.SUPABASE_CONFIG?.KEY || 'sb_publishable_Ux9Ya2ULT6XjAuKP85aJnw_nthS-rJ3');

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 載入研究成員
  async function loadMembers() {
    const { data } = await supabaseClient.from('members').select('*').order('sort_order', { ascending: true });
    const list = document.getElementById('membersList');
    list.innerHTML = data?.map(m => `
      <div class="member-item">
        <h3>${m.name}</h3>
        <div class="meta">${m.title}</div>
        <p>${m.field}</p>
      </div>
    `).join('') || '暫無成員';
  }

  // 載入研究主題
  async function loadTopics() {
    const { data } = await supabaseClient.from('topics').select('*').order('sort_order', { ascending: true });
    const list = document.getElementById('topicsList');
    list.innerHTML = data?.map(t => `
      <div class="card topic-item">
        <h3>${t.title}</h3>
        <p>${t.description}</p>
      </div>
    `).join('') || '暫無主題';
  }

  // 載入最新消息
  async function loadNews() {
    const { data } = await supabaseClient.from('news').select('*').order('published_date', { ascending: false });
    const list = document.getElementById('newsList');
    list.innerHTML = data?.map(n => `
      <div class="news-item">
        <h3>${n.title}</h3>
        <p>${n.description}</p>
      </div>
    `).join('') || '暫無消息';
  }

  loadMembers();
  loadTopics();
  loadNews();
</script>

</body>
</html>
